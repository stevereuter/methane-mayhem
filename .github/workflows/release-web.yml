name: Release Web Package and Pages

on:
    release:
        types: [published]

permissions:
    contents: write
    pages: write
    id-token: write

concurrency:
    group: release-web-${{ github.event.release.id }}
    cancel-in-progress: false

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    package-web:
        runs-on: ubuntu-latest

        steps:
            - name: Check out release tag
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name }}

            - name: Read version from config.json
              id: version
              shell: bash
              run: |
                  version="$(node -p "require('./config.json').version")"
                  if [ -z "$version" ]; then
                    echo "Error: version not found in config.json" >&2
                    exit 1
                  fi
                  echo "version=$version" >> "$GITHUB_OUTPUT"

            - name: Prepare web release files
              shell: bash
              run: |
                  rm -rf dist-web
                  cp -R web dist-web

                  sed -i "s/###VERSION###/${{ steps.version.outputs.version }}/g" dist-web/index.html
                  sed -i "s/###VERSION###/${{ steps.version.outputs.version }}/g" dist-web/scripts/index.mjs

            - name: Build web zip name
              id: zip
              shell: bash
              run: |
                  repo_name="${GITHUB_REPOSITORY#*/}"
                  zip_name="${repo_name}-web-v${{ steps.version.outputs.version }}.zip"
                  echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"

            - name: Create web zip for itch
              shell: bash
              run: |
                  cd dist-web
                  zip -r "../${{ steps.zip.outputs.zip_name }}" .

            - name: Upload web zip to release assets
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: ${{ steps.zip.outputs.zip_name }}
                  fail_on_unmatched_files: true

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist-web

    deploy-pages:
        needs: package-web
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
